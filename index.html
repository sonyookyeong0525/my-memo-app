<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#262262">
  <meta name="description" content="PWA 기반 오프라인 메모장">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MY MEMO">

  <title>MY MEMO</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- 앱 아이콘 -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">

  <!-- Pretendard 폰트 -->
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 앱 전체 래퍼 -->
  <div id="app">

    <!-- 헤더 -->
    <header class="header">
      <h1 class="header__logo">MY MEMO</h1>
      <div class="header__actions">
        <button class="btn-icon" id="btn-new" aria-label="새 메모 작성">
          <!-- + 아이콘 -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="btn-icon" id="btn-more" aria-label="더보기 메뉴">
          <!-- ⋮ 아이콘 -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="main">

      <!-- 메모 목록 화면 -->
      <section class="view-list" id="view-list">

        <!-- 검색 & 필터 영역 -->
        <div class="search-bar">
          <div class="search-input-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="search-input" class="search-input" placeholder="메모검색">
          </div>
          <button class="btn-icon btn-star-filter" id="btn-star-filter" aria-label="중요 메모만 보기" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>

        <!-- 메모 목록 -->
        <ul class="memo-list" id="memo-list">
          <!-- 메모 카드가 동적으로 삽입됩니다 -->
        </ul>

        <!-- 메모 없을 때 안내 -->
        <div class="empty-state" id="empty-state" hidden>
          <p>메모가 없습니다.<br>+ 버튼을 눌러 새 메모를 작성하세요.</p>
        </div>

      </section>

      <!-- 글쓰기 / 상세보기 화면 -->
      <section class="view-editor" id="view-editor" hidden>
        <textarea class="editor-textarea" id="editor-textarea" placeholder="메모를 입력하세요..."></textarea>

        <!-- 에디터 하단 버튼 영역 -->
        <div class="editor-actions">
          <div class="editor-actions__left">
            <button class="btn-icon btn-important" id="btn-important" aria-label="중요 메모 토글" aria-pressed="false">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <button class="btn-text" id="btn-camera" aria-label="카메라">카메라</button>
            <button class="btn-text" id="btn-record" aria-label="녹음">녹음</button>
          </div>
          <div class="editor-actions__right">
            <button class="btn-save" id="btn-save">저장</button>
          </div>
        </div>
      </section>

    </main>

    <!-- 더보기 메뉴 (드롭다운) -->
    <nav class="more-menu" id="more-menu" hidden aria-label="더보기 메뉴">
      <ul>
        <li><button id="menu-export">메모 내보내기</button></li>
        <li><button id="menu-import">메모 가져오기</button></li>
        <li>
          <span>글자크기</span>
          <div class="font-size-group">
            <button data-size="small">작게</button>
            <button data-size="medium" class="active">보통</button>
            <button data-size="large">크게</button>
          </div>
        </li>
        <li><button id="menu-darkmode">다크모드</button></li>
      </ul>
    </nav>

    <!-- 파일 가져오기용 숨김 input -->
    <input type="file" id="import-input" accept=".json" hidden>

  </div><!-- /#app -->

  <!-- JavaScript -->
  <script src="js/app.js"></script>
</body>
</html>
