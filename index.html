<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#262262">
  <meta name="description" content="PWA 기반 오프라인 메모장">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MY MEMO">

  <title>MY MEMO</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- 앱 아이콘 -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">

  <!-- Pretendard 폰트 -->
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('fonts/Pretendard/Pretendard-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 앱 전체 래퍼 -->
  <div id="app">

    <!-- 헤더 -->
    <header class="header">
      <h1 class="header__logo">MY MEMO</h1>
      <div class="header__actions">
        <!-- 앱 설치 버튼 (설치 가능할 때만 표시) -->
        <button class="btn-install" id="btn-install" aria-label="앱 설치" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          설치
        </button>
        <button class="btn-icon" id="btn-new" aria-label="새 메모 작성">
          <!-- + 아이콘 -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="btn-icon" id="btn-more" aria-label="더보기 메뉴">
          <!-- ⋮ 아이콘 -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="main">

      <!-- 메모 목록 화면 -->
      <section class="view-list" id="view-list">

        <!-- 검색 & 필터 영역 -->
        <div class="search-bar">
          <div class="search-input-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="search-input" class="search-input" placeholder="메모검색">
          </div>
          <button class="btn-icon btn-star-filter" id="btn-star-filter" aria-label="중요 메모만 보기" aria-pressed="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>

        <!-- 메모 목록 -->
        <ul class="memo-list" id="memo-list">
          <!-- 메모 카드가 동적으로 삽입됩니다 -->
        </ul>

        <!-- 메모 없을 때 안내 -->
        <div class="empty-state" id="empty-state" hidden>
          <p>메모가 없습니다.<br>+ 버튼을 눌러 새 메모를 작성하세요.</p>
        </div>

      </section>

      <!-- 글쓰기 / 상세보기 화면 -->
      <section class="view-editor" id="view-editor" hidden>

        <!-- textarea 카드 -->
        <div class="editor-card">
          <textarea class="editor-textarea" id="editor-textarea" placeholder="메모를 입력하세요..."></textarea>
          <!-- 이미지 미리보기 영역 -->
          <div class="image-preview-list" id="image-preview-list" hidden></div>
        </div>

        <!-- 에디터 하단 버튼 영역 -->
        <div class="editor-actions">
          <div class="editor-actions__left">
            <!-- 중요 토글 (항상) -->
            <button class="btn-editor-action btn-important" id="btn-important" aria-label="중요 메모 토글" aria-pressed="false">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <!-- 카메라 (항상) -->
            <button class="btn-editor-action btn-image" id="btn-image" aria-label="이미지 추가">카메라</button>
            <!-- 녹음 (항상) -->
            <button class="btn-editor-action btn-record" id="btn-record" aria-label="녹음">녹음</button>
            <!-- 삭제 (수정 모드) -->
            <button class="btn-editor-action btn-delete" id="btn-delete" aria-label="메모 삭제" hidden>삭제</button>
            <!-- 공유 (수정 모드) -->
            <button class="btn-editor-action btn-share" id="btn-share" aria-label="메모 공유" hidden>공유</button>
            <!-- 복사 (수정 모드) -->
            <button class="btn-editor-action btn-copy" id="btn-copy" aria-label="메모 복사" hidden>복사</button>
          </div>
          <div class="editor-actions__right">
            <button class="btn-save" id="btn-save">저장</button>
          </div>
        </div>

        <!-- 이미지 선택 메뉴 (갤러리 / 카메라) -->
        <div class="image-picker-menu" id="image-picker-menu" hidden>
          <button id="btn-pick-gallery">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            갤러리
          </button>
          <button id="btn-pick-camera">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            카메라
          </button>
        </div>

        <!-- 녹음 상태 표시 -->
        <div class="record-status" id="record-status" hidden>
          <span class="record-dot"></span>
          <span id="record-time">00:00</span>
          <button id="btn-record-stop" aria-label="녹음 중지">중지</button>
        </div>

      </section>

    </main>

    <!-- 더보기 메뉴 (드롭다운) -->
    <nav class="more-menu" id="more-menu" hidden aria-label="더보기 메뉴">
      <ul>
        <li><button id="menu-export">메모 내보내기</button></li>
        <li><button id="menu-import">메모 가져오기</button></li>
        <li>
          <span>글자크기</span>
          <div class="font-size-group">
            <button data-size="small">작게</button>
            <button data-size="medium" class="active">보통</button>
            <button data-size="large">크게</button>
          </div>
        </li>
        <li><button id="menu-darkmode"><span>다크모드</span><span class="darkmode-indicator" id="darkmode-indicator"></span></button></li>
      </ul>
    </nav>

    <!-- 파일 가져오기용 숨김 input -->
    <input type="file" id="import-input" accept=".json" hidden>
    <!-- 이미지 첨부 — 갤러리 -->
    <input type="file" id="image-gallery-input" accept="image/*" multiple hidden>
    <!-- 이미지 첨부 — 카메라 -->
    <input type="file" id="image-camera-input" accept="image/*" capture="environment" hidden>

  </div><!-- /#app -->

  <!-- JavaScript -->
  <script src="js/app.js"></script>
  <!-- Service Worker 등록 -->
  <script src="js/sw-register.js"></script>
</body>
</html>
